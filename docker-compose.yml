services:
  redpanda-permissions:
    image: redpandadata/redpanda:v24.2.7
    container_name: shr-redpanda-permissions
    user: "0"
    entrypoint: ["chown", "-R", "101:101", "/var/lib/redpanda/data"]
    volumes:
      - ./data/redpanda:/var/lib/redpanda/data

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: shr-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "19092:9092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ./data/redpanda:/var/lib/redpanda/data
    depends_on:
      redpanda-permissions:
        condition: service_completed_successfully

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: shr-clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-ozon}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "18123:8123"
      - "19000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: shr-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9090:9000"
      - "9091:9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  grafana-permissions:
    image: grafana/grafana:11.3.0
    container_name: shr-grafana-permissions
    user: "0"
    entrypoint: ["chown", "-R", "472:0", "/var/lib/grafana"]
    volumes:
      - ./data/grafana:/var/lib/grafana

  collector:
    build: ./collector
    container_name: shr-collector
    env_file: .env
    volumes:
      - ./accounts.json:/app/accounts.json:ro
    depends_on:
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  consumer:
    build: ./consumer
    container_name: shr-consumer
    env_file: .env
    depends_on:
      redpanda:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: shr-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./data/grafana:/var/lib/grafana
    depends_on:
      clickhouse:
        condition: service_healthy
      grafana-permissions:
        condition: service_completed_successfully
